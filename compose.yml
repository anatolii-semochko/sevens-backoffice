services:
  web-interface:
    build:
      context: web-interface/docker/development/nginx
    networks:
      - default
      - blockchain.dev
      - proxy
    ports:
      - "8090:80"
    volumes:
      - ./web-interface:/app
      - ../sevenstime-storage:/app/public/storage:ro

  web-interface-node:
    build:
      context: web-interface/docker/development/node
    environment:
      WDS_SOCKET_PORT: 0
      REACT_APP_AUTH_URL: http://localhost:8089
    command: sh -c "until [ -f .ready ] ; do sleep 1 ; done && yarn start"
    volumes:
      - ./web-interface:/app
      - ../sevenstime-storage:/app/public/storage:ro
    tty: true

  web-interface-node-cli:
    build:
      context: web-interface/docker/development/node
    volumes:
      - ./web-interface:/app
      - ../sevenstime-storage:/app/public/storage:ro

  api:
    build:
      context: api/docker
      dockerfile: development/nginx/Dockerfile
    volumes:
      - ./api:/app
      - ./api/docker/common/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web-interface/public:/app/public/web
      - ../sevenstime-storage:/app/public/storage
    networks:
      - default
      - blockchain.dev
      - proxy
    ports:
      - "8089:80"
    depends_on:
      - api-php-fpm

  api-php-fpm:
    build:
      context: api/docker
      dockerfile: development/php-fpm/Dockerfile
#    environment:
#      APP_ENV: dev
#      APP_DEBUG: 1
    networks:
      - default
    volumes:
      - ./api:/app
      - ./web-interface/public:/app/public/web
      - ../sevenstime-storage:/app/public/storage

  api-php-cli:
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
#    environment:
#      APP_ENV: dev
#      APP_DEBUG: 1
    networks:
      - default
    volumes:
      - ./api:/app
      - ./web-interface/public:/app/public/web
      - ../sevenstime-storage:/app/public/storage

secrets:
  api_db_password:
    file: ./docker/development/secrets/api_db_password
  api_mailer_password:
    file: ./docker/development/secrets/api_mailer_password
  sentry_dsn:
    file: ./docker/development/secrets/sentry_dsn
  jwt_encryption_key:
    file: ./docker/development/secrets/jwt_encryption_key
  jwt_public_key:
    file: ./docker/development/secrets/jwt_public_key
  jwt_private_key:
    file: ./docker/development/secrets/jwt_private_key
  backup_aws_secret_access_key:
    file: ./docker/development/secrets/backup_aws_secret_access_key

volumes:
  backup-storage:

networks:
  blockchain.dev:
    name: sevens-backoffice.dev
  proxy:
    external: true
    name: sevens-proxy
